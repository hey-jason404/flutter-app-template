# 依賴自動更新:pub(全 workspace 成員)與 GitHub Actions。
# 更新 PR 一樣要過 CI(check + generator-smoke)才能合併。
version: 2
updates:
  - package-ecosystem: "pub"
    directories:
      - "/"
      - "/app"
      - "/packages/*"
      - "/features/*"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pub-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
